services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  sensor01:
    build: ./sensor
    image: iot-sensor:latest
    container_name: sensor01
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      SENSOR_ID: sensor01
      SEND_INTERVAL: 5
    depends_on:
      - mosquitto

  sensor02:
    image: iot-sensor:latest
    container_name: sensor02
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      SENSOR_ID: sensor02
